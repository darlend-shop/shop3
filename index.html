<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARLEND | Магазин цифровых товаров</title>
    <script src="telegram.org"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --text: #ffffff; --accent: #00ff66; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 5px; }
        .tagline { text-align: center; font-size: 12px; color: #aaa; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .price { color: var(--accent); font-weight: bold; margin: 10px 0; }
        button { background: var(--accent); color: #000; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #555; background: #111; color: #fff; box-sizing: border-box; }
        .card-num { background: #111; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; letter-spacing: 1px; border: 1px dashed var(--accent); margin: 10px 0; }
        .reviews { margin-top: 30px; background: var(--card); padding: 15px; border-radius: 10px; }
        .review-item { border-bottom: 1px solid #444; padding: 8px 0; font-size: 14px; }
    </style>
</head>
<body>

    <h1>DARLEND</h1>
    <div class="tagline">Контакты: @BoostHubX1</div>

    <div class="grid" id="products"></div>

    <div class="reviews">
        <h3>Отзывы покупателей</h3>
        <div id="reviews-list">
            <div class="review-item"><b>@User1:</b> Топ! Все пришло за 5 минут. 🔥</div>
        </div>
    </div>

    <!-- Модальное окно заказа -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3 id="modalTitle">Покупка</h3>
            <div id="step1">
                <div id="inputContainer"></div>
                <button onclick="goToPayment()">Далее</button>
            </div>
            <div id="step2" style="display:none;">
                <p>Переведите <span id="finalPrice" style="color:var(--accent); font-weight:bold;"></span> руб. на карту Ozon Банк:</p>
                <div class="card-num" onclick="copyCard()">2204321148318157</div>
                <small style="color:#aaa;">Нажмите на номер для копирования</small>
                <button style="margin-top:15px;" onclick="confirmPayment()">Я оплатил(-а)</button>
            </div>
            <div id="step3" style="display:none;">
                <p style="color:var(--accent);">⌛ Заявка отправлена администратору!</p>
                <p>Ожидайте пополнения. После выполнения здесь появится форма отзыва.</p>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const products = [
        { id: 1, cat: 'pubg', name: '60 UC', price: 79 },
        { id: 2, cat: 'pubg', name: '325 UC', price: 369 },
        { id: 3, cat: 'pubg', name: '660 UC', price: 789 },
        { id: 4, cat: 'pubg', name: '1800 UC', price: 1949 },
        { id: 5, cat: 'pubg', name: '3850 UC', price: 3879 },
        { id: 6, cat: 'pubg', name: '8100 UC', price: 7749 },
        { id: 7, cat: 'bs', name: 'Brawl Pass', price: 819 },
        { id: 8, cat: 'bs', name: 'Brawl Pass Plus', price: 1169 },
        { id: 9, cat: 'bs', name: '30 гемов', price: 194 },
        { id: 10, cat: 'bs', name: '360 гемов', price: 1789 }
    ];

    let currentOrder = {};

    function renderProducts() {
        const container = document.getElementById('products');
        container.innerHTML = products.map(p => `
            <div class="card">
                <div style="font-size:12px; color:#aaa;">${p.cat === 'pubg' ? 'PUBG Mobile' : 'Brawl Stars'}</div>
                <div style="font-weight:bold; margin-top:5px;">${p.name}</div>
                <div class="price">${p.price} ₽</div>
                <button onclick="openModal(${p.id})">Купить</button>
            </div>
        `).join('');
    }

    function openModal(id) {
        const p = products.find(x => x.id === id);
        currentOrder = { ...p };
        document.getElementById('modalTitle').innerText = p.name;
        document.getElementById('finalPrice').innerText = p.price;
        
        const inputContainer = document.getElementById('inputContainer');
        if(p.cat === 'pubg') {
            inputContainer.innerHTML = '<input type="text" id="userData" placeholder="Введите ваш UID в PUBG">';
        } else {
            inputContainer.innerHTML = `
                <input type="email" id="userData" placeholder="Email от Supercell ID">
                <input type="text" id="userCode" placeholder="Код из письма (если пришел)">
            `;
        }
        
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('orderModal').style.display = 'flex';
    }

    function goToPayment() {
        const data = document.getElementById('userData').value;
        if(!data) return alert('Заполните поле!');
        currentOrder.userData = data;
        if(document.getElementById('userCode')) {
            currentOrder.code = document.getElementById('userCode').value || 'Не указан';
        }
        document.getElementById('step1').style.style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function copyCard() {
        navigator.clipboard.writeText('2204321148318157');
        alert('Номер карты скопирован!');
    }

    function confirmPayment() {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        
        // Отправка данных серверной логике через Telegram WebApp
        tg.sendData(JSON.stringify({
            action: 'new_order',
            username: tg.initDataUnsafe?.user?.username || 'Аноним',
            product: currentOrder.name,
            price: currentOrder.price,
            data: currentOrder.userData,
            code: currentOrder.code || '-'
        }));
    }

    window.onclick = function(event) {
        const modal = document.getElementById('orderModal');
        if (event.target == modal) modal.style.display = "none";
    }

    renderProducts();
</script>
</body>
</html>
